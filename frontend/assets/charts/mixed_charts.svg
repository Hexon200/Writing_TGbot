<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Mixed charts for transport mode and emissions</title>
  <desc id="desc">A donut chart shows commuting mode share and a bar chart shows emissions.</desc>
  <rect width="720" height="420" fill="#ffffff"/>
  <text x="42" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#17211c">Transport mode and emissions</text>
  <g transform="translate(190 210)">
    <text x="0" y="-132" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#17211c">Commute share</text>
    <circle r="104" fill="none" stroke="#1b7f6e" stroke-width="52" stroke-dasharray="314 340" transform="rotate(-90)"/>
    <circle r="104" fill="none" stroke="#2f5fa8" stroke-width="52" stroke-dasharray="144 510" stroke-dashoffset="-314" transform="rotate(-90)"/>
    <circle r="104" fill="none" stroke="#b26a00" stroke-width="52" stroke-dasharray="98 556" stroke-dashoffset="-458" transform="rotate(-90)"/>
    <circle r="104" fill="none" stroke="#8b5cf6" stroke-width="52" stroke-dasharray="59 595" stroke-dashoffset="-556" transform="rotate(-90)"/>
    <circle r="104" fill="none" stroke="#b54747" stroke-width="52" stroke-dasharray="39 615" stroke-dashoffset="-615" transform="rotate(-90)"/>
    <circle r="70" fill="#ffffff"/>
  </g>
  <g transform="translate(410 86)" font-family="Arial, sans-serif">
    <text x="120" y="0" text-anchor="middle" font-size="18" font-weight="700" fill="#17211c">Emissions g/km</text>
    <line x1="0" y1="254" x2="250" y2="254" stroke="#9aa7a0" stroke-width="2"/>
    <line x1="0" y1="34" x2="0" y2="254" stroke="#9aa7a0" stroke-width="2"/>
    <g stroke="#e6ece8" stroke-width="1">
      <line x1="0" y1="200" x2="250" y2="200"/>
      <line x1="0" y1="146" x2="250" y2="146"/>
      <line x1="0" y1="92" x2="250" y2="92"/>
      <line x1="0" y1="38" x2="250" y2="38"/>
    </g>
    <rect x="20" y="38" width="32" height="216" fill="#1b7f6e"/>
    <rect x="72" y="170" width="32" height="84" fill="#2f5fa8"/>
    <rect x="124" y="200" width="32" height="54" fill="#b26a00"/>
    <rect x="176" y="254" width="32" height="0" fill="#8b5cf6"/>
    <rect x="228" y="254" width="32" height="0" fill="#b54747"/>
    <g font-size="12" fill="#67716b">
      <text x="36" y="274" text-anchor="middle">Car</text>
      <text x="88" y="274" text-anchor="middle">Bus</text>
      <text x="140" y="274" text-anchor="middle">Train</text>
      <text x="192" y="274" text-anchor="middle">Cycle</text>
      <text x="244" y="274" text-anchor="middle">Walk</text>
    </g>
  </g>
  <g font-family="Arial, sans-serif" font-size="13" fill="#17211c">
    <rect x="82" y="354" width="13" height="13" fill="#1b7f6e"/><text x="102" y="366">Car</text>
    <rect x="140" y="354" width="13" height="13" fill="#2f5fa8"/><text x="160" y="366">Bus</text>
    <rect x="202" y="354" width="13" height="13" fill="#b26a00"/><text x="222" y="366">Train</text>
    <rect x="274" y="354" width="13" height="13" fill="#8b5cf6"/><text x="294" y="366">Cycle</text>
    <rect x="350" y="354" width="13" height="13" fill="#b54747"/><text x="370" y="366">Walk</text>
  </g>
</svg>
