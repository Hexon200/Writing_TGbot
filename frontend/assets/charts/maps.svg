<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Maps of town centre redevelopment</title>
  <desc id="desc">Two simplified maps compare a town centre in 2010 and 2024.</desc>
  <rect width="720" height="420" fill="#ffffff"/>
  <text x="42" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#17211c">Town centre redevelopment</text>
  <g font-family="Arial, sans-serif" font-size="13" fill="#17211c">
    <text x="190" y="78" text-anchor="middle" font-size="18" font-weight="700">2010</text>
    <text x="530" y="78" text-anchor="middle" font-size="18" font-weight="700">2024</text>
    <g transform="translate(70 95)">
      <rect width="250" height="250" fill="#f7f8f4" stroke="#9aa7a0" stroke-width="2"/>
      <rect x="0" y="104" width="250" height="34" fill="#d7dde0"/>
      <rect x="20" y="22" width="88" height="58" fill="#2f5fa8"/>
      <text x="64" y="56" text-anchor="middle" fill="#fff">Cinema</text>
      <rect x="138" y="24" width="88" height="58" fill="#1b7f6e"/>
      <text x="182" y="58" text-anchor="middle" fill="#fff">Library</text>
      <rect x="20" y="158" width="84" height="62" fill="#b26a00"/>
      <text x="62" y="192" text-anchor="middle" fill="#fff">Car park</text>
      <rect x="130" y="154" width="96" height="66" fill="#8b5cf6"/>
      <text x="178" y="191" text-anchor="middle" fill="#fff">Market</text>
      <circle cx="210" cy="122" r="12" fill="#b54747"/>
      <text x="210" y="128" text-anchor="middle" fill="#fff">B</text>
      <text x="125" y="126" text-anchor="middle" fill="#67716b">Main Road</text>
    </g>
    <g transform="translate(410 95)">
      <rect width="250" height="250" fill="#f7f8f4" stroke="#9aa7a0" stroke-width="2"/>
      <rect x="0" y="104" width="250" height="34" fill="#d7dde0"/>
      <rect x="20" y="22" width="88" height="58" fill="#6f7d87"/>
      <text x="64" y="48" text-anchor="middle" fill="#fff">Apart-</text>
      <text x="64" y="65" text-anchor="middle" fill="#fff">ments</text>
      <rect x="138" y="24" width="88" height="58" fill="#1b7f6e"/>
      <text x="182" y="58" text-anchor="middle" fill="#fff">Library</text>
      <rect x="20" y="158" width="84" height="62" fill="#d8f0e6" stroke="#1b7f6e"/>
      <text x="62" y="184" text-anchor="middle">Public</text>
      <text x="62" y="202" text-anchor="middle">square</text>
      <rect x="130" y="154" width="96" height="66" fill="#8b5cf6"/>
      <text x="178" y="191" text-anchor="middle" fill="#fff">Market</text>
      <rect x="190" y="90" width="42" height="38" fill="#b54747"/>
      <text x="211" y="113" text-anchor="middle" fill="#fff">Hub</text>
      <rect x="148" y="84" width="54" height="18" fill="#b26a00"/>
      <text x="175" y="98" text-anchor="middle" fill="#fff">Cafe</text>
      <text x="125" y="126" text-anchor="middle" fill="#67716b">Main Road</text>
    </g>
  </g>
</svg>

