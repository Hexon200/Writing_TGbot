<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Line graph of bicycle commuters</title>
  <desc id="desc">Two rising lines compare City A and City B between 2014 and 2024.</desc>
  <rect width="720" height="420" fill="#ffffff"/>
  <text x="42" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#17211c">Bicycle commuters, 2014-2024</text>
  <line x1="72" y1="340" x2="650" y2="340" stroke="#9aa7a0" stroke-width="2"/>
  <line x1="72" y1="70" x2="72" y2="340" stroke="#9aa7a0" stroke-width="2"/>
  <g font-family="Arial, sans-serif" font-size="13" fill="#67716b">
    <text x="54" y="344" text-anchor="end">0</text>
    <text x="54" y="279" text-anchor="end">10</text>
    <text x="54" y="214" text-anchor="end">20</text>
    <text x="54" y="149" text-anchor="end">30</text>
    <text x="54" y="84" text-anchor="end">40</text>
    <text x="64" y="370">2014</text>
    <text x="202" y="370">2016</text>
    <text x="340" y="370">2018</text>
    <text x="478" y="370">2020</text>
    <text x="618" y="370">2024</text>
  </g>
  <g stroke="#e6ece8" stroke-width="1">
    <line x1="72" y1="275" x2="650" y2="275"/>
    <line x1="72" y1="210" x2="650" y2="210"/>
    <line x1="72" y1="145" x2="650" y2="145"/>
    <line x1="72" y1="80" x2="650" y2="80"/>
  </g>
  <polyline points="72,223 210,210 348,184 486,158 650,67" fill="none" stroke="#1b7f6e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="72,275 210,262 348,249 486,236 650,184" fill="none" stroke="#2f5fa8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <g>
    <circle cx="72" cy="223" r="5" fill="#1b7f6e"/>
    <circle cx="486" cy="158" r="5" fill="#1b7f6e"/>
    <circle cx="650" cy="67" r="5" fill="#1b7f6e"/>
    <circle cx="72" cy="275" r="5" fill="#2f5fa8"/>
    <circle cx="486" cy="236" r="5" fill="#2f5fa8"/>
    <circle cx="650" cy="184" r="5" fill="#2f5fa8"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="14" fill="#17211c">
    <rect x="520" y="92" width="18" height="5" fill="#1b7f6e"/>
    <text x="548" y="99">City A</text>
    <rect x="520" y="118" width="18" height="5" fill="#2f5fa8"/>
    <text x="548" y="125">City B</text>
  </g>
</svg>

